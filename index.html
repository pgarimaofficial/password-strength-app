<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Password Strength Checker & Generator</title>

    <meta
      name="description"
      content="Free Password Strength Checker & Generator. Instantly check password security and generate strong passwords with this simple password tool."
    />
    <meta
      name="keywords"
      content="password strength checker, password generator, strong password tool, secure password checker, password security tool"
    />
    <meta name="author" content="Password Strength Tool" />

    <meta property="og:title" content="Password Strength Checker & Generator" />
    <meta
      property="og:description"
      content="Check password strength and generate secure passwords instantly."
    />
    <meta property="og:type" content="website" />

    <meta name="theme-color" content="#121212" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="manifest" href="manifest.json" />

    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
        font-family: Roboto, sans-serif;
      }

      body {
        margin: 0;
        background: #121212;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        background: #1e1e1e;
        padding: 25px;
        border-radius: 16px;
        width: 92%;
        max-width: 420px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
        font-weight: 500;
      }

      .input-wrapper {
        position: relative;
        margin-bottom: 12px;
      }

      input {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        background: #2a2a2a;
        color: white;
        font-size: 16px;
        outline: none;
      }

      .toggle {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        font-size: 14px;
        color: #bbb;
      }

      .buttons {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      button {
        flex: 1;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #6200ee;
        color: white;
        font-weight: 500;
        cursor: pointer;
        transition: 0.2s;
      }

      button:hover {
        opacity: 0.9;
      }

      .strength-bar {
        height: 10px;
        background: #333;
        border-radius: 10px;
        margin-top: 18px;
        overflow: hidden;
      }

      .strength-fill {
        height: 100%;
        width: 0%;
        border-radius: 10px;
        transition:
          width 0.4s ease,
          background 0.4s ease;
      }

      .strength-text {
        margin-top: 10px;
        font-size: 14px;
      }

      .suggestions {
        margin-top: 15px;
        font-size: 14px;
        color: #ccc;
      }

      ul {
        padding-left: 18px;
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 20px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Password Strength Checker & Generator</h1>

      <div class="input-wrapper">
        <input type="password" id="password" placeholder="Enter password" />
        <span class="toggle" onclick="togglePassword()">Show</span>
      </div>

      <div class="buttons">
        <button onclick="generatePassword()">Generate</button>
        <button onclick="copyPassword()">Copy</button>
      </div>

      <div class="strength-bar">
        <div id="strengthFill" class="strength-fill"></div>
      </div>

      <div id="strengthText" class="strength-text">Strength: None</div>

      <div class="suggestions">
        Suggestions:
        <ul id="suggestions"></ul>
      </div>
    </div>

    <script>
      const passwordInput = document.getElementById("password");
      const strengthFill = document.getElementById("strengthFill");
      const strengthText = document.getElementById("strengthText");
      const suggestionsList = document.getElementById("suggestions");

      passwordInput.addEventListener("input", checkStrength);

      function togglePassword() {
        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          document.querySelector(".toggle").innerText = "Hide";
        } else {
          passwordInput.type = "password";
          document.querySelector(".toggle").innerText = "Show";
        }
      }

      function generatePassword() {
        const chars =
          "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+";

        let password = "";

        for (let i = 0; i < 12; i++) {
          password += chars.charAt(Math.floor(Math.random() * chars.length));
        }

        passwordInput.value = password;

        checkStrength();
      }

      function copyPassword() {
        let password = passwordInput.value;

        if (!password) {
          alert("Enter password first");
          return;
        }

        navigator.clipboard
          .writeText(password)
          .then(() => {
            alert("Password copied");
          })
          .catch(() => {
            alert("Copy failed");
          });
      }

      function checkStrength() {
        let password = passwordInput.value;

        let score = 0;

        let suggestions = [];

        if (password.length >= 8) {
          score++;
        } else {
          suggestions.push("Use at least 8 characters");
        }

        if (/[A-Z]/.test(password)) {
          score++;
        } else {
          suggestions.push("Add uppercase letter");
        }

        if (/[a-z]/.test(password)) {
          score++;
        } else {
          suggestions.push("Add lowercase letter");
        }

        if (/[0-9]/.test(password)) {
          score++;
        } else {
          suggestions.push("Add numbers");
        }

        if (/[^A-Za-z0-9]/.test(password)) {
          score++;
        } else {
          suggestions.push("Add special characters (!@#$)");
        }

        let percent = (score / 5) * 100;

        strengthFill.style.width = percent + "%";

        if (score <= 2) {
          strengthFill.style.background = "#ff5252";
          strengthText.innerText = "Strength: Weak";
        } else if (score <= 4) {
          strengthFill.style.background = "#ffb300";
          strengthText.innerText = "Strength: Medium";
        } else {
          strengthFill.style.background = "#00e676";
          strengthText.innerText = "Strength: Strong";
        }

        suggestionsList.innerHTML = "";

        suggestions.forEach((s) => {
          let li = document.createElement("li");

          li.innerText = s;

          suggestionsList.appendChild(li);
        });
      }
    </script>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("service-worker.js")
          .then(() => console.log("Service Worker Registered"))
          .catch((err) => console.log("Service Worker Error", err));
      }
    </script>
  </body>
</html>
